<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Bauinspiration</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --dirt: #8B6340;
    --grass: #5D9E3A;
    --stone: #7A7A7A;
    --wood: #A0762A;
    --gold: #FFD700;
    --sky: #87CEEB;
    --night: #0a0e1a;
    --glow: #7fffb2;
    --accent: #ff6b35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--night);
    font-family: 'VT323', monospace;
    color: white;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* Starfield background */
  #stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* Main 3D canvas */
  #cube-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    cursor: grab;
  }
  #cube-canvas:active { cursor: grabbing; }

  /* Landing title */
  #landing-ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 40px;
  }

  #title-block {
    text-align: center;
    animation: titleFloat 3s ease-in-out infinite;
  }

  #title-block h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 2.5vw, 28px);
    color: var(--glow);
    text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow), 2px 2px 0 #000;
    letter-spacing: 2px;
    line-height: 1.6;
  }

  #title-block p {
    font-family: 'VT323', monospace;
    font-size: clamp(16px, 2vw, 22px);
    color: #aee;
    margin-top: 10px;
    text-shadow: 1px 1px 0 #000;
  }

  @keyframes titleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  #hint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    text-align: center;
    pointer-events: none;
  }

  #hint p {
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    animation: blink 1.5s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Face labels on cube */
  .face-label {
    position: fixed;
    z-index: 3;
    pointer-events: none;
    text-align: center;
    transform: translate(-50%, -50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: white;
    text-shadow: 2px 2px 0 #000, 0 0 10px rgba(0,0,0,0.8);
    white-space: nowrap;
    background: rgba(0,0,0,0.4);
    padding: 4px 8px;
    border-radius: 4px;
    display: none;
  }

  /* Category overlay */
  #category-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    background: var(--night);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  #category-overlay.active { display: flex; }

  #cat-header {
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 3px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .back-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.3);
    color: white;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.2);
    border-color: var(--glow);
    color: var(--glow);
  }

  #cat-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 2.5vw, 24px);
    text-shadow: 0 0 20px currentColor;
  }

  #cat-subtitle {
    font-family: 'VT323', monospace;
    font-size: 20px;
    opacity: 0.7;
    margin-left: auto;
  }

  #ideas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 30px 40px;
    overflow-y: auto;
    flex: 1;
  }

  .idea-card {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .idea-card:hover {
    transform: translateY(-4px);
    border-color: var(--card-accent, var(--glow));
    box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px rgba(127,255,178,0.1);
  }

  .idea-card-thumb {
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    position: relative;
    overflow: hidden;
  }

  .idea-card-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.6) 100%);
  }

  .idea-card-body {
    padding: 16px;
  }

  .idea-card-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    margin-bottom: 8px;
    line-height: 1.6;
  }

  .idea-card-desc {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    line-height: 1.4;
    margin-bottom: 12px;
  }

  .idea-card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-family: 'VT323', monospace;
    font-size: 14px;
    padding: 2px 8px;
    border: 1px solid currentColor;
    border-radius: 2px;
  }

  .badge.easy { color: #7fff7f; }
  .badge.medium { color: #ffd700; }
  .badge.hard { color: #ff6b35; }
  .badge.time { color: #87ceeb; }

  /* Tutorial overlay */
  #tutorial-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 20;
    background: var(--night);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  #tutorial-overlay.active { display: flex; }

  #tut-header {
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 3px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  #tut-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(12px, 2vw, 18px);
    line-height: 1.5;
  }

  #tut-content {
    flex: 1;
    overflow-y: auto;
    padding: 30px 40px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  .tut-section {
    margin-bottom: 40px;
  }

  .tut-section h3 {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--glow);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(127,255,178,0.3);
  }

  .tut-section p, .tut-section li {
    font-family: 'VT323', monospace;
    font-size: 19px;
    line-height: 1.7;
    color: rgba(255,255,255,0.85);
  }

  .tut-section ul {
    list-style: none;
    padding-left: 10px;
  }

  .tut-section ul li::before {
    content: '▶ ';
    color: var(--glow);
  }

  .materials-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }

  .material-item {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 10px 14px;
    font-family: 'VT323', monospace;
    font-size: 17px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tut-images-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .tut-img-slot {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .tut-img-placeholder {
    aspect-ratio: 16/9;
    background: rgba(255,255,255,0.04);
    border: 2px dashed rgba(255,255,255,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color 0.2s;
  }

  .tut-img-placeholder:hover {
    border-color: var(--glow);
  }

  .tut-img-icon { font-size: 32px; }

  .tut-img-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.5);
  }

  .tut-img-hint {
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: rgba(255,255,255,0.25);
  }

  .tut-img-caption-placeholder {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    border-bottom: 1px dashed rgba(255,255,255,0.1);
    padding-bottom: 4px;
  }

  .yt-embed-wrapper {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    background: #000;
    border: 2px solid rgba(255,255,255,0.1);
  }

  .yt-embed-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
  ::-webkit-scrollbar-thumb:hover { background: var(--glow); }

  /* Pixel art decorations */
  .pixel-border {
    image-rendering: pixelated;
    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.3),
      inset -2px -2px 0 rgba(0,0,0,0.5);
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .idea-card {
    animation: fadeInUp 0.4s ease both;
  }

  .idea-card:nth-child(1) { animation-delay: 0.05s; }
  .idea-card:nth-child(2) { animation-delay: 0.10s; }
  .idea-card:nth-child(3) { animation-delay: 0.15s; }
  .idea-card:nth-child(4) { animation-delay: 0.20s; }
  .idea-card:nth-child(5) { animation-delay: 0.25s; }
  .idea-card:nth-child(6) { animation-delay: 0.30s; }

  /* Tooltip for cube faces */
  #face-tooltip {
    position: fixed;
    z-index: 5;
    background: rgba(0,0,0,0.85);
    border: 2px solid var(--glow);
    padding: 8px 14px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--glow);
    pointer-events: none;
    display: none;
    white-space: nowrap;
  }

  /* Click ripple */
  .click-hint {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: rgba(255,255,255,0.4);
    pointer-events: none;
    text-align: center;
  }
</style>
</head>

// STARFIELD

const starsCanvas = document.getElementById('stars');
const starsCtx = starsCanvas.getContext('2d');

function resizeStars() {
  starsCanvas.width = window.innerWidth;
  starsCanvas.height = window.innerHeight;
  drawStars();
}

function drawStars() {
  starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * starsCanvas.width;
    const y = Math.random() * starsCanvas.height;
    const r = Math.random() * 1.5;
    starsCtx.beginPath();
    starsCtx.arc(x, y, r, 0, Math.PI * 2);
    starsCtx.fillStyle = `rgba(255,255,255,${0.3 + Math.random() * 0.7})`;
    starsCtx.fill();
  }
}

resizeStars();
window.addEventListener('resize', resizeStars);

// THREE.JS CUBE
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('cube-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0x7fffb2, 0.3);
dirLight2.position.set(-5, -3, -5);
scene.add(dirLight2);

// Create face textures using canvas
function makeFaceTexture(emoji, text, bgColor, accentColor) {
  const size = 512;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');

  // Background
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, size, size);

  // Pixel grid overlay
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i < size; i += 32) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(size, i); ctx.stroke();
  }

  // Border
  ctx.strokeStyle = accentColor;
  ctx.lineWidth = 16;
  ctx.strokeRect(8, 8, size - 16, size - 16);

  // Corner pixels (Minecraft style)
  const corners = [[0,0],[size-32,0],[0,size-32],[size-32,size-32]];
  corners.forEach(([x,y]) => {
    ctx.fillStyle = accentColor;
    ctx.fillRect(x, y, 32, 32);
  });

  // Emoji
  ctx.font = '140px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, size/2, size/2 - 40);

  // Text
  ctx.font = 'bold 36px "Courier New", monospace';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 8;
  ctx.fillText(text, size/2, size/2 + 90);
  ctx.shadowBlur = 0;

  const texture = new THREE.CanvasTexture(c);
  return texture;
}

// Build cube
const geometry = new THREE.BoxGeometry(2.5, 2.5, 2.5);
const faceOrder = [
  // right, left, top, bottom, front, back = Three.js order
  categories[3], // right = Modern
  categories[1], // left = Mittelalter
  categories[4], // top = Fantasy
  categories[5], // bottom = Wasser/Wüste
  categories[0], // front = Japan
  categories[2], // back = Natur
];

const materials = faceOrder.map(cat => new THREE.MeshLambertMaterial({
  map: makeFaceTexture(cat.faceEmoji, cat.faceText, cat.bgColor, cat.color),
  side: THREE.FrontSide,
}));

const cube = new THREE.Mesh(geometry, materials);
scene.add(cube);

// Cube outline / edge glow
const edgesGeo = new THREE.EdgesGeometry(geometry);
const edgesMat = new THREE.LineBasicMaterial({ color: 0x7fffb2, linewidth: 2, transparent: true, opacity: 0.5 });
const edges = new THREE.LineSegments(edgesGeo, edgesMat);
scene.add(edges);

// Face normals for raycasting
const faceNormals = [
  new THREE.Vector3(1,0,0),  // right - Modern
  new THREE.Vector3(-1,0,0), // left - Medieval
  new THREE.Vector3(0,1,0),  // top - Fantasy
  new THREE.Vector3(0,-1,0), // bottom - Water/Desert
  new THREE.Vector3(0,0,1),  // front - Japan
  new THREE.Vector3(0,0,-1), // back - Nature
];

// ─── Interaction ───────────────────────────────────────────────
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let rotX = 0.3, rotY = 0.5;
let velX = 0, velY = 0;
let autoRotate = true;
let autoTimer = null;

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  autoRotate = false;
  clearTimeout(autoTimer);
  prevMouse = { x: e.clientX, y: e.clientY };
  velX = 0; velY = 0;
});

canvas.addEventListener('mousemove', e => {
  if (!isDragging) {
    // Hover tooltip
    checkHover(e.clientX, e.clientY);
    return;
  }
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  velX = dy * 0.01;
  velY = dx * 0.01;
  rotX += velX;
  rotY += velY;
  prevMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mouseup', e => {
  if (!isDragging) return;
  isDragging = false;
  autoTimer = setTimeout(() => { autoRotate = true; }, 3000);
  // Check click vs drag
  const totalDelta = Math.abs(e.clientX - prevMouse.x) + Math.abs(e.clientY - prevMouse.y);
  if (Math.abs(velX) < 0.02 && Math.abs(velY) < 0.02) {
    handleClick(e.clientX, e.clientY);
  }
});

canvas.addEventListener('mouseleave', () => {
  isDragging = false;
  document.getElementById('face-tooltip').style.display = 'none';
});

// Touch support
canvas.addEventListener('touchstart', e => {
  isDragging = true;
  autoRotate = false;
  clearTimeout(autoTimer);
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  velX = 0; velY = 0;
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  velX = dy * 0.01;
  velY = dx * 0.01;
  rotX += velX;
  rotY += velY;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });

canvas.addEventListener('touchend', e => {
  isDragging = false;
  autoTimer = setTimeout(() => { autoRotate = true; }, 3000);
  if (Math.abs(velX) < 0.02 && Math.abs(velY) < 0.02) {
    handleClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
});

const raycaster = new THREE.Raycaster();
const mouse2D = new THREE.Vector2();

function getFaceIndex(intersection) {
  // faceIndex in geometry corresponds to material index (2 triangles per face)
  return Math.floor(intersection.faceIndex / 2);
}

function checkHover(cx, cy) {
  mouse2D.x = (cx / window.innerWidth) * 2 - 1;
  mouse2D.y = -(cy / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObject(cube);
  const tooltip = document.getElementById('face-tooltip');
  if (hits.length > 0) {
    const fi = getFaceIndex(hits[0]);
    const cat = faceOrder[fi];
    tooltip.textContent = cat.name;
    tooltip.style.display = 'block';
    tooltip.style.left = (cx + 14) + 'px';
    tooltip.style.top = (cy - 10) + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
  }
}

function handleClick(cx, cy) {
  mouse2D.x = (cx / window.innerWidth) * 2 - 1;
  mouse2D.y = -(cy / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObject(cube);
  if (hits.length > 0) {
    const fi = getFaceIndex(hits[0]);
    const cat = faceOrder[fi];
    openCategory(cat);
  }
}

// ─── Animation loop ────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  if (!isDragging) {
    if (autoRotate) {
      rotY += 0.004;
      rotX += 0.001;
    } else {
      velX *= 0.94;
      velY *= 0.94;
      rotX += velX;
      rotY += velY;
    }
  }

  cube.rotation.x = rotX;
  cube.rotation.y = rotY;
  edges.rotation.x = rotX;
  edges.rotation.y = rotY;

  // Pulse edge glow
  const t = Date.now() * 0.001;
  edgesMat.opacity = 0.3 + Math.sin(t * 2) * 0.2;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

  document.getElementById('cat-title').style.color = cat.color;
  document.getElementById('cat-subtitle').textContent = cat.subtitle;
  document.getElementById('category-overlay').style.background = cat.bgColor;

  const grid = document.getElementById('ideas-grid');
  grid.innerHTML = '';

  cat.ideas.forEach((idea, idx) => {
    const card = document.createElement('div');
    card.className = 'idea-card';
    card.style.setProperty('--card-accent', cat.color);
    card.innerHTML = `
      <div class="idea-card-thumb" style="background: linear-gradient(135deg, ${cat.bgColor}, ${cat.color}33)">
        <span style="position:relative;z-index:1">${idea.emoji}</span>
      </div>
      <div class="idea-card-body">
        <div class="idea-card-title">${idea.title}</div>
        <div class="idea-card-desc">${idea.desc}</div>
        <div class="idea-card-meta">
          <span class="badge ${idea.difficulty}">${idea.diffLabel}</span>
          <span class="badge time">⏱ ${idea.time}</span>
        </div>
      </div>
    `;
    card.style.animationDelay = (idx * 0.05) + 's';
    card.onclick = () => openTutorial(cat, idea);
    grid.appendChild(card);
  });
}

function closeCategory() {
  document.getElementById('category-overlay').classList.remove('active');
}

  `).join('');

    <div class="tut-section">

        <span class="badge ${idea.difficulty}" style="font-size:16px;padding:6px 14px">${idea.diffLabel}</span>
        <span class="badge time" style="font-size:16px;padding:6px 14px">⏱ ${idea.time}</span>
      </div>
      <p>${idea.desc}</p>
    </div>

    <!-- Materials -->
    <div class="tut-section">
      <h3>📦 BENÖTIGTE MATERIALIEN</h3>
      <div class="materials-grid">
        ${idea.materials.map(m => `<div class="material-item">${m}</div>`).join('')}
      </div>
    </div>

    <!-- Image Steps -->
    <div class="tut-section">
      <h3>📸 BAUANLEITUNG</h3>
      <div class="tut-images-grid">
        ${imagePlaceholders}
      </div>
    </div>

    <!-- YouTube -->
    <div class="tut-section">
      <h3>🎬 VIDEO-TUTORIAL</h3>
      <div class="yt-embed-wrapper">
        <iframe
          src="https://www.youtube.com/embed/${idea.ytId}"
          title="YouTube Tutorial: ${idea.title}"
          allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        ></iframe>
      </div>
      <div style="margin-top:12px;font-family:'VT323',monospace;font-size:16px;color:rgba(255,255,255,0.4);text-align:center">
        Video-ID eintragen: <code style="color:var(--glow)">${idea.ytId}</code> → ersetze mit echter YouTube-ID
      </div>
    </div>
  `;
}

function closeTutorial() {
  document.getElementById('tutorial-overlay').classList.remove('active');
}
